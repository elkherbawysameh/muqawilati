# ضع هذا الملف في: /etc/nginx/sites-available/muqawilati
# ثم نفّذ: sudo ln -s /etc/nginx/sites-available/muqawilati /etc/nginx/sites-enabled/
# استبدل YOUR_DOMAIN بدومينك الفعلي

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # رفع الحد الأقصى لحجم الملفات المرفوعة (للصور)
    client_max_body_size 20M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # تحسين سرعة تحميل الصور
    location /uploads/ {
        alias /var/www/muqawilati/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
